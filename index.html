<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetOps AI Adventure - Powered by Ziggy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --navy-mid: #112038;
    --teal: #4EB8A0;
    --teal-light: #E1F5EE;
    --teal-dark: #0a6e56;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --amber: #EF9F27;
    --amber-light: #FAEEDA;
    --amber-dark: #633806;
    --rubine: #CE0058;
    --rubine-bright: #E4137A;
    --rubine-light: #FFE0EE;
    --rubine-dark: #7A0034;
    --peach: #FFB584;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --border-mid: #d1d5db;
    --bg: #ffffff;
    --bg-secondary: #fdf7fa;
    --radius: 12px;
    --radius-sm: 8px;
    --bu-gradient: linear-gradient(135deg, #CE0058 0%, #E4137A 40%, #FFB584 80%, #7F77DD 100%);
  }

  body::before {
    content: '';
    position: fixed;
    top: -400px; right: -400px;
    width: 1400px; height: 1400px;
    background: radial-gradient(circle, rgba(228,19,122,0.55) 0%, rgba(206,0,88,0.35) 22%, rgba(228,19,122,0.18) 42%, rgba(255,181,132,0.10) 60%, transparent 80%);
    pointer-events: none;
    z-index: 0;
    animation: heroGlowDrift 12s ease-in-out infinite;
  }
  @keyframes heroGlowDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-40px, 30px) scale(1.05); }
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -400px; left: -300px;
    width: 1100px; height: 1100px;
    background: radial-gradient(circle, rgba(127,119,221,0.35) 0%, rgba(78,184,160,0.15) 45%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }
  #app { position: relative; z-index: 1; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: linear-gradient(180deg, #0a1628 0%, #130c22 50%, #0a1628 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 4rem;
  }

  #app {
    max-width: 700px;
    margin: 0 auto;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #13243f 0%, #0a1628 55%, #1a0d24 100%);
    border: 1px solid rgba(228,19,122,.15);
    border-radius: 18px;
    padding: 2rem 12rem 1.75rem 2rem;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
    min-height: 172px;
    box-shadow:
      0 20px 60px rgba(206,0,88,.25),
      0 8px 24px rgba(10,22,40,.4);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(228,19,122,0.55) 0%, rgba(206,0,88,0.30) 35%, rgba(255,181,132,0.15) 60%, transparent 75%);
    pointer-events: none;
    animation: heroGlow 8s ease-in-out infinite;
  }
  @keyframes heroGlow {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
    50% { transform: translate(-20px, 20px) scale(1.08); opacity: .85; }
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(127,119,221,0.25) 0%, rgba(78,184,160,0.12) 40%, transparent 70%);
    pointer-events: none;
  }
  .hero-whisper {
    margin-top: .75rem;
    font-size: 12px;
    font-weight: 600;
    color: #FFB3D1;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: .02em;
  }
  .hero-whisper::before {
    content: '';
    width: 22px; height: 2px;
    background: linear-gradient(90deg, #CE0058, #E4137A, #FFB584);
    border-radius: 1px;
  }
  .hero-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: .5rem;
  }
  .hero-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 34px;
    font-weight: 600;
    font-variation-settings: 'opsz' 96;
    color: #fff;
    margin-bottom: .35rem;
    line-height: 1.1;
    letter-spacing: -.015em;
  }
  .hero-sub {
    font-size: 14px;
    color: rgba(255,255,255,.55);
  }
  .ziggy {
    position: absolute;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    width: 144px;
    height: 144px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #E4137A;
    box-shadow:
      0 0 0 6px rgba(228,19,122,.18),
      0 0 0 12px rgba(228,19,122,.08),
      0 10px 32px rgba(206,0,88,.55),
      0 0 60px rgba(228,19,122,.35);
    animation: ziggyPulse 4s ease-in-out infinite;
  }
  @keyframes ziggyPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(228,19,122,.18), 0 0 0 12px rgba(228,19,122,.08), 0 10px 32px rgba(206,0,88,.55), 0 0 60px rgba(228,19,122,.35); }
    50% { box-shadow: 0 0 0 6px rgba(228,19,122,.24), 0 0 0 14px rgba(228,19,122,.10), 0 12px 40px rgba(206,0,88,.65), 0 0 80px rgba(228,19,122,.45); }
  }
  .scene-ziggy {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    float: right;
    margin: 0 0 .5rem 1rem;
    border: 3px solid var(--border);
    position: relative;
    z-index: 2;
  }
  .card.l1 .scene-ziggy { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(78,184,160,.15), 0 6px 20px rgba(78,184,160,.25); }
  .card.l2 .scene-ziggy { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(127,119,221,.15), 0 6px 20px rgba(127,119,221,.25); }
  .card.l3 .scene-ziggy { border-color: var(--amber); box-shadow: 0 0 0 4px rgba(239,159,39,.15), 0 6px 20px rgba(239,159,39,.3); }
  .finish-ziggy {
    display: block;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 1.25rem;
    border: 4px solid var(--rubine);
    box-shadow: 0 8px 28px rgba(206,0,88,.4), 0 0 0 8px rgba(228,19,122,.12);
  }

  /* Score bar */
  .score-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .dots { display: flex; gap: 5px; align-items: center; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,.18);
    transition: all .3s;
  }
  .dot.done { background: var(--teal); box-shadow: 0 0 8px rgba(78,184,160,.5); }
  .dot.active { background: var(--rubine-bright); box-shadow: 0 0 12px rgba(228,19,122,.7); transform: scale(1.3); }
  .xp {
    background: linear-gradient(135deg, rgba(228,19,122,.2) 0%, rgba(127,119,221,.2) 100%);
    border: 1px solid rgba(228,19,122,.35);
    color: #fff;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    box-shadow: 0 2px 10px rgba(228,19,122,.2);
  }
  .explored { font-size: 12px; color: rgba(255,255,255,.55); }

  /* Level track */
  .level-track {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .lvl {
    font-size: 11.5px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,.15);
    color: rgba(255,255,255,.55);
    background: rgba(255,255,255,.04);
    transition: all .25s cubic-bezier(.4,0,.2,1);
    letter-spacing: .01em;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .lvl:hover {
    transform: translateY(-1px);
    border-color: var(--rubine-bright);
    color: #fff;
    background: rgba(228,19,122,.15);
    box-shadow: 0 4px 16px rgba(228,19,122,.25);
  }
  .lvl.l1 { border-color: var(--teal); background: linear-gradient(135deg, rgba(78,184,160,.20) 0%, rgba(78,184,160,.35) 100%); color: #a8e5d3; box-shadow: 0 2px 14px rgba(78,184,160,.35); }
  .lvl.l2 { border-color: var(--purple); background: linear-gradient(135deg, rgba(127,119,221,.22) 0%, rgba(127,119,221,.38) 100%); color: #c6c1f5; box-shadow: 0 2px 14px rgba(127,119,221,.35); }
  .lvl.l3 { border-color: var(--amber); background: linear-gradient(135deg, rgba(239,159,39,.22) 0%, rgba(239,159,39,.40) 100%); color: #ffd79a; box-shadow: 0 2px 14px rgba(239,159,39,.4); }
  .lvl.l1:hover { border-color: #7cd4bd; color: #fff; box-shadow: 0 4px 20px rgba(78,184,160,.55); }
  .lvl.l2:hover { border-color: #a59eee; color: #fff; box-shadow: 0 4px 20px rgba(127,119,221,.55); }
  .lvl.l3:hover { border-color: #ffc47a; color: #fff; box-shadow: 0 4px 20px rgba(239,159,39,.55); }

  /* Card - editorial depth, warmer shadow, signature sunset accent */
  .card {
    background: var(--bg);
    border: 1px solid rgba(10,22,40,.06);
    border-radius: 16px;
    padding: 2.25rem 2rem 1.75rem;
    margin-bottom: .75rem;
    box-shadow:
      0 1px 2px rgba(10,22,40,.04),
      0 8px 24px rgba(206,0,88,.05),
      0 24px 48px rgba(10,22,40,.06);
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--bu-gradient);
    opacity: .85;
  }
  .card.l1::after { background: linear-gradient(90deg, var(--teal) 0%, #7cd4bd 50%, var(--teal) 100%); }
  .card.l2::after { background: linear-gradient(90deg, var(--purple) 0%, #a59eee 50%, var(--purple) 100%); }
  .card.l3::after { background: linear-gradient(90deg, var(--amber) 0%, #ffc47a 50%, var(--amber) 100%); }
  .card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(206,0,88,.07) 0%, rgba(255,181,132,.03) 45%, transparent 70%);
    pointer-events: none;
  }

  /* Empathy callout - BetterUp Rubine warmth */
  .empathy {
    background: linear-gradient(135deg, rgba(206,0,88,0.08) 0%, rgba(228,19,122,0.06) 45%, rgba(255,181,132,0.08) 100%);
    border: 1px solid rgba(206,0,88,0.22);
    border-left: 3px solid var(--rubine);
    border-radius: var(--radius-sm);
    padding: .95rem 1rem .95rem 2.6rem;
    margin: 0 0 1.25rem 0;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    position: relative;
  }
  .empathy::before {
    content: '✧';
    position: absolute;
    left: 1rem;
    top: .8rem;
    font-size: 18px;
    color: var(--rubine);
    font-weight: 700;
  }
  .empathy strong { color: var(--rubine); font-weight: 700; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 0;
    border-radius: 0;
    margin-bottom: 1rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    background: transparent !important;
    position: relative;
  }
  .tag::before {
    content: '';
    width: 18px;
    height: 1.5px;
    border-radius: 1px;
  }
  .tg-teal { color: var(--teal-dark); }
  .tg-teal::before { background: var(--teal); }
  .tg-purple { color: var(--purple-dark); }
  .tg-purple::before { background: var(--purple); }
  .tg-amber { color: var(--amber-dark); }
  .tg-amber::before { background: var(--amber); }
  .tg-navy { color: var(--navy); }
  .tg-navy::before { background: var(--rubine); }

  .scene-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 600;
    font-variation-settings: 'opsz' 72;
    color: var(--text);
    margin-bottom: .75rem;
    line-height: 1.15;
    letter-spacing: -.018em;
  }
  .scene-body {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }
  .scene-body::first-letter {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 1.85em;
    font-weight: 700;
    font-variation-settings: 'opsz' 96;
    line-height: 1;
    padding-right: 1px;
    background: var(--bu-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .card.l1 .scene-body::first-letter { background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .card.l2 .scene-body::first-letter { background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .card.l3 .scene-body::first-letter { background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dark) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

  /* Outcome box - editorial callout */
  .obox {
    border-left: 3px solid var(--teal);
    padding: 1.1rem 1.25rem;
    border-radius: 0 12px 12px 0;
    margin: 1.5rem 0 1.25rem;
    position: relative;
  }
  .obox.teal { background: linear-gradient(135deg, rgba(78,184,160,.10) 0%, rgba(78,184,160,.04) 100%); border-left-color: var(--teal); }
  .obox.purple { background: linear-gradient(135deg, rgba(127,119,221,.10) 0%, rgba(127,119,221,.04) 100%); border-left-color: var(--purple); }
  .obox.amber { background: linear-gradient(135deg, rgba(239,159,39,.12) 0%, rgba(239,159,39,.04) 100%); border-left-color: var(--amber); }
  .olabel {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: .5rem;
  }
  .obox.teal .olabel { color: var(--teal-dark); }
  .obox.purple .olabel { color: var(--purple-dark); }
  .obox.amber .olabel { color: var(--amber-dark); }
  .otext { font-size: 14px; line-height: 1.65; color: var(--text); }
  .nugget {
    font-size: 13px;
    font-weight: 700;
    margin-top: 9px;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .obox.teal .nugget { color: var(--teal-dark); }
  .obox.purple .nugget { color: var(--purple-dark); }
  .obox.amber .nugget { color: var(--amber-dark); }

  /* Inner blocks - editorial threaded steps, not form fields */
  .iblock {
    background: transparent;
    border: none;
    border-left: 2px solid var(--border);
    border-radius: 0;
    padding: .15rem 0 1.1rem 1.25rem;
    margin: 0;
    position: relative;
  }
  .iblock + .iblock { margin-top: .1rem; }
  .card.l1 .iblock { border-left-color: rgba(78,184,160,.45); }
  .card.l2 .iblock { border-left-color: rgba(127,119,221,.45); }
  .card.l3 .iblock { border-left-color: rgba(239,159,39,.5); }
  .iblock::before {
    content: '';
    position: absolute;
    left: -6px; top: .15rem;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border-mid);
    box-shadow: 0 0 0 3px var(--bg), 0 2px 6px rgba(206,0,88,.2);
  }
  .card.l1 .iblock::before { background: radial-gradient(circle at 30% 30%, #7cd4bd 0%, var(--teal) 60%, var(--teal-dark) 100%); box-shadow: 0 0 0 3px var(--bg), 0 2px 6px rgba(78,184,160,.4); }
  .card.l2 .iblock::before { background: radial-gradient(circle at 30% 30%, #a59eee 0%, var(--purple) 60%, var(--purple-dark) 100%); box-shadow: 0 0 0 3px var(--bg), 0 2px 6px rgba(127,119,221,.4); }
  .card.l3 .iblock::before { background: radial-gradient(circle at 30% 30%, #ffc47a 0%, var(--amber) 60%, var(--amber-dark) 100%); box-shadow: 0 0 0 3px var(--bg), 0 2px 6px rgba(239,159,39,.4); }
  .iblock-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 17px;
    font-weight: 600;
    font-variation-settings: 'opsz' 48;
    color: var(--text);
    margin-bottom: .4rem;
    letter-spacing: -.01em;
    line-height: 1.3;
  }
  .iblock-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.65;
  }

  /* Connector grid */
  .cgrid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
    margin: .5rem 0;
  }
  .cnode {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: .5rem .75rem;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
  }
  .cnode-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 2px;
  }
  .carr {
    text-align: center;
    font-size: 18px;
    color: var(--text-muted);
  }

  /* Choices */
  .choices { display: flex; flex-direction: column; gap: 10px; margin-top: .75rem; }
  .choice {
    background: var(--bg);
    border: 1px solid rgba(10,22,40,.08);
    border-radius: 10px;
    padding: .95rem 1.1rem;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all .2s cubic-bezier(.4,0,.2,1);
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Sans', sans-serif;
    width: 100%;
    box-shadow: 0 1px 2px rgba(10,22,40,.03);
  }
  .choice:hover {
    background: linear-gradient(135deg, rgba(206,0,88,0.05) 0%, rgba(255,181,132,0.05) 100%);
    border-color: rgba(206,0,88,.35);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(206,0,88,.12), 0 1px 3px rgba(10,22,40,.06);
  }
  .choice:hover .choice-arrow { color: var(--rubine); }
  .choice-arrow {
    color: var(--text-muted);
    font-size: 18px;
    margin-left: auto;
    flex-shrink: 0;
  }

  /* Nav */
  .nav-row { display: flex; gap: 8px; margin-top: .75rem; flex-wrap: wrap; }
  .nav-btn {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: var(--radius-sm);
    padding: .45rem .9rem;
    font-size: 13px;
    color: rgba(255,255,255,.65);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .nav-btn:hover {
    color: #fff;
    background: rgba(255,255,255,.1);
    border-color: rgba(255,255,255,.3);
  }

  /* Share panel */
  .share-panel {
    background: var(--navy);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-top: .75rem;
  }
  .share-title {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: .25rem;
  }
  .share-sub {
    font-size: 13px;
    color: rgba(255,255,255,.55);
    margin-bottom: 1rem;
  }
  .share-preview {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: var(--radius-sm);
    padding: 1rem;
    font-size: 13px;
    color: rgba(255,255,255,.9);
    line-height: 1.6;
    margin-bottom: .9rem;
    font-family: 'DM Mono', monospace;
    white-space: pre-wrap;
    width: 100%;
    min-height: 180px;
    resize: vertical;
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .share-preview:focus {
    border-color: rgba(228,19,122,.6);
    background: rgba(255,255,255,.10);
  }
  .share-preview::placeholder {
    color: rgba(255,255,255,.35);
    font-style: italic;
  }
  .share-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: rgba(255,255,255,.5);
    margin-bottom: .4rem;
    margin-top: .25rem;
  }
  .share-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: .9rem;
  }
  .toggle-btn {
    flex: 1;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: var(--radius-sm);
    padding: .55rem .75rem;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,.7);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .toggle-btn.active {
    background: rgba(78,184,160,.2);
    border-color: var(--teal);
    color: #fff;
    font-weight: 700;
  }
  .toggle-btn:hover:not(.active) {
    background: rgba(255,255,255,.12);
    color: rgba(255,255,255,.9);
  }
  .share-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .share-btn {
    border: none;
    border-radius: var(--radius-sm);
    padding: .6rem 1.2rem;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity .15s, transform .1s;
  }
  .share-btn:hover { opacity: .85; transform: translateY(-1px); }
  .share-btn:active { transform: translateY(0); }
  .btn-copy { background: var(--teal); color: #fff; }
  .btn-slack { background: #fff; color: var(--navy); }
  .copied-msg {
    font-size: 12px;
    color: var(--teal);
    margin-top: .5rem;
    display: none;
    font-weight: 500;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 2.5rem;
    padding-top: 2rem;
    font-size: 12px;
    color: rgba(255,255,255,.55);
    position: relative;
  }
  .footer::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--rubine), var(--rubine-bright), var(--peach), transparent);
    border-radius: 1px;
  }
  .footer strong { color: #fff; }
</style>

    empathy: '<strong>This is the fastest AI upgrade you can give yourself.</strong> No external accounts, no code, no waiting for a rule to fire. Turn them on once, and every future Claude chat can reach into your real work. Five minutes, huge payoff.',
    body: 'Five steps, all inside claude.ai. You\'ll have Gmail, Drive, and Slack connected before lunch.',
    customHTML: `

      <div class="iblock"><div class="iblock-title">Step 2 - Turn on three to start (don\'t overthink it)</div><div class="iblock-desc">The three that pay off immediately for NetOps work:<br>• <strong>Google Drive</strong> - Claude can search your Drive, open docs, read Slides and Sheets<br>• <strong>Gmail</strong> - Claude can search your inbox, summarize threads, draft replies<br>• <strong>Slack</strong> - Claude can search channels, post messages, read threads<br><br>Click the gear/+ icon on each. Authorize with your @betterup.co Google account (for Drive/Gmail) or your BetterUp Slack account. Grant all requested permissions.</div></div>
      <div class="iblock"><div class="iblock-title">Step 3 - Try your first Connector prompt</div><div class="iblock-desc">Open a new Claude chat. Try one of these verbatim:<br><br>• <em>"Search my Drive for the Executive Suite briefing doc and summarize the top 3 themes."</em><br>• <em>"Find emails from the last 7 days mentioning [coach name] and tell me what\'s outstanding."</em><br>• <em>"Search the #netops-pulse-replies Slack channel for messages from this week and group them by theme."</em><br><br>Claude will reach into the tool, read real data, and respond. This is the "oh wow" moment.</div></div>
      <div class="iblock"><div class="iblock-title">Step 4 - Add more over the next few days</div><div class="iblock-desc">Once the first three feel natural, browse the rest of the directory. Worth turning on for NetOps work:<br>• <strong>Google Calendar</strong> - "what\'s my Friday look like?"<br>• <strong>Atlassian Rovo</strong> - Jira + Confluence search<br>• <strong>Airtable</strong> - if you use bases for coach/account tracking<br>• <strong>Asana</strong> - task coordination<br><br>Don\'t turn them all on at once. Add as you hit a moment where "I wish Claude could see X."</div></div>
      <div class="iblock"><div class="iblock-title">Step 5 - If a Connector asks for permissions you\'re unsure about</div><div class="iblock-desc">Read them. They\'ll say things like "read your email" or "send messages on your behalf." That\'s the feature, not a red flag. If a permission looks weird or broader than you\'d expect, hit cancel and ping in #ai-users - someone on the team has probably already vetted it.<br><br>You can revoke a Connector any time: same directory → toggle off.</div></div>`,

    customHTML: `
      <div class="iblock"><div class="iblock-title">Step 1 - Write your context doc (and let Claude sharpen it)</div><div class="iblock-desc">Open a Google Doc. Rough bullets: your role, top 3 priorities, daily tools, the 3 tasks that waste the most time. Don't polish. Then paste the whole thing into Claude with this prompt: <em>"Rewrite this as sharper Project Instructions for a NetOps workspace - tighten the language and flag anything missing."</em> Claude hands you back a cleaner version. That's your AI's operating manual. Grinding on perfect wording is the slow path; letting Claude edit the rough version is the fast one.</div></div>

  l1_ready: {
    lvl: 1, cardClass: 'l1',
    tag: 'tg-teal', tagText: 'level 1 - your one action',
    title: 'Your first real try, step by step.',
    empathy: '<strong>AI can feel intimidating. It\'s really just a chat box.</strong> No hidden features, no technical setup. If you can text a friend, you can do this - we\'ll walk through every click.',
    body: 'Six small steps. Go in order. None of them take more than a minute.',
    customHTML: `
      <div class="iblock"><div class="iblock-title">Step 1 - Pick your AI (either works)</div><div class="iblock-desc"><strong>Claude:</strong> go to <strong>claude.ai</strong> → "Sign up" → use your @betterup.co Google account.<br><strong>Gemini:</strong> go to <strong>gemini.google.com</strong> → you\'re likely already signed in via work Google.<br><br>Don\'t overthink which one. Pick either. Both are free and both are good at what you need this week.</div></div>
      <div class="iblock"><div class="iblock-title">Step 2 - What you\'ll see (no surprises)</div><div class="iblock-desc">A mostly empty screen with a big text box at the bottom. The box says something like "Message Claude" or "Ask Gemini anything." That\'s it. That\'s the whole interface. You type, you press enter, you get an answer.</div></div>
      <div class="iblock"><div class="iblock-title">Step 3 - Pick one real task from your week</div><div class="iblock-desc">Start tiny. Good first tasks:<br>• An email you\'ve been putting off writing<br>• A long Slack thread you need to catch up on<br>• Meeting notes you need to turn into a summary<br>• A filter checklist you\'re building manually<br><br>Rule: if it normally takes you more than 15 minutes, pick something smaller. Momentum beats ambition on try #1.</div></div>
      <div class="iblock"><div class="iblock-title">Step 4 - Type it like you\'re explaining to a colleague</div><div class="iblock-desc">Paste the context, describe what you want, say the format.<br><br><em>Example:</em> "I need to draft an email declining a vendor. They\'re nice but we don\'t have budget. Keep it warm, 3-4 sentences, not corporate."<br><br><strong>⚠️ Safety note:</strong> Don\'t paste anything marked confidential - real member data, NDAs, legal docs. Generic work content and summaries are fine.</div></div>
      <div class="iblock"><div class="iblock-title">Step 5 - If the answer isn\'t right, just keep talking</div><div class="iblock-desc">This is where most people quit too early. The first answer is rarely the best one. Just reply with plain English:<br>• "Make it shorter"<br>• "More casual - we already know each other"<br>• "Skip the intro paragraph"<br>• "Rewrite this as if I\'m the vendor\'s friend"<br><br>Treat it like giving feedback to a smart intern. Two or three rounds and you\'re there.</div></div>
      <div class="iblock"><div class="iblock-title">Step 6 - Drop one line in your NetOps AI Pulse DM</div><div class="iblock-desc">Whatever happened - magic, weird, disappointing, surprising - share one sentence about it. The team learns from each other\'s tries, not from polished outcomes.</div></div>`,
    outcome: { type: 'teal', label: 'If you freeze at the blank box - ask this first',
      text: 'Paste this into Claude or Gemini:\n\n"I\'m new to AI. I want your help with [what you\'re trying to do]. I\'m not sure how to phrase my request. Can you ask me 3 questions that would help you give me a great answer?"\n\nThe AI will interview YOU. Answer the questions. Then it hands you back a perfect result. This is the single most useful move for beginners.',
      nugget: 'Every person on this team felt weird the first time. It gets weird-good, then normal, then invisible. You\'re already past the hardest step by reading this.' },

  l2_ready: {
    lvl: 2, cardClass: 'l2',
    tag: 'tg-purple', tagText: 'level 2 - your one action',
    title: 'Your first Zap, step by step.',
    empathy: '<strong>Zapier looks intimidating the first time. It\'s not.</strong> The hardest part is clicking "Try this template" - everything after is picking your accounts from dropdowns. If you get stuck, it\'s usually on Step 4 or 5. We\'ll flag those.',
    body: 'Follow these in order. Every step matters - especially the test (Step 4) and the on-switch (Step 5), which is the step most people miss.',
    customHTML: `
      <div class="iblock"><div class="iblock-title">Step 1 - Sign in with your BetterUp SSO</div><div class="iblock-desc">Go to <strong>zapier.com</strong> → "Log in" → "Log in with SSO" → enter your @betterup.com or @betterup.co email → Okta will redirect and authenticate you. <strong>BetterUp has Zapier Enterprise for everyone</strong>, so you\'re not on the free tier - you get multi-step Zaps, Claude-powered steps inside Zaps, unlimited apps, and plenty of task runs. If SSO doesn\'t recognize you, ping #ai-users to get added to the workspace.</div></div>
      <div class="iblock"><div class="iblock-title">Step 2 - Start from a template (never from scratch)</div><div class="iblock-desc">In the left nav, click <strong>"Explore"</strong> or <strong>"Templates"</strong>. Search one of these, which map to real NetOps pain:<br>• "Gmail to Google Sheets" (log flagged emails)<br>• "Slack to Google Sheets" (log messages from a channel)<br>• "Google Form to Slack" (alert on form submission)<br><br>Click <strong>"Try this template"</strong> on the one that fits. Templates pre-build the hard parts - triggers, actions, field mapping.</div></div>
      <div class="iblock"><div class="iblock-title">Step 3 - Connect your accounts (OAuth popups)</div><div class="iblock-desc">Zapier will ask you to connect each app one at a time. A Google or Slack popup appears → click <strong>"Allow"</strong>. Then fill in the dropdowns it shows you:<br>• Which Gmail label/search?<br>• Which Sheet and which tab?<br>• Which Slack channel?<br><br>If a field confuses you, hover the <strong>(?)</strong> icon - Zapier explains inline.</div></div>
      <div class="iblock"><div class="iblock-title">⚠️ Step 4 - Test before turning it on</div><div class="iblock-desc">Zapier offers a <strong>"Test step"</strong> button at each stage. <strong>Click it.</strong> It pulls a real recent email/message and shows you exactly what would happen.<br><br>If the test row lands in the wrong column or the data looks weird, fix the field mapping now. Way easier than debugging a broken live Zap later.</div></div>
      <div class="iblock"><div class="iblock-title">⚠️ Step 5 - Flip the switch (the step everyone misses)</div><div class="iblock-desc">Top-right corner of the editor: a toggle labeled <strong>"Publish"</strong> or <strong>"Turn Zap on."</strong> Until you flip this, nothing runs - your Zap just sits as a draft.<br><br>If your Zap isn\'t doing anything after setup, this is almost always why.</div></div>
      <div class="iblock"><div class="iblock-title">Step 6 - Check in after a week</div><div class="iblock-desc">Left nav → <strong>"Zap History"</strong>. Every run shows up here, success or failure. If something broke, click the failed run to see the error. Then paste the error into Claude and ask what it means.</div></div>`,
    outcome: { type: 'purple', label: 'If you get stuck - ask Claude',
      text: 'Paste this into Claude or Gemini:\n\n"I\'m setting up a Zapier Zap that [what you want it to do]. I\'m stuck at [the step]. The screen shows [what you see]. Walk me through the exact next click like I\'ve never used Zapier."\n\nClaude knows Zapier\'s UI well and will give you button names, not theory. If you hit an error, paste it verbatim - "what does this mean and how do I fix it?"',
      nugget: 'Nobody sets up their first Zap without at least one confusing moment. You will, and you\'ll get past it. Ten minutes of confusion saves you hours every week.' },
    choices: [

    body: 'Four weeks. One move per week. Pace matters - this is compounding, not sprinting.',
    customHTML: `
      <div class="iblock"><div class="iblock-title">Week 1 - Step 1: Write your Project Instructions (30 min)</div><div class="iblock-desc"><strong>This is the most important piece of your command center.</strong> Claude Projects have a field called "Project Instructions" - think of it as Claude\'s briefing before every single chat. Whatever you put here, Claude reads first, every time. That\'s why the sharper this doc, the sharper every answer.<br><br>Open a new Google Doc. Paste this template and fill in each section in plain English. Don\'t polish - first draft is the goal. (You\'ll paste this whole doc into Claude in Step 2.)<br><br><strong>## Who I am</strong><br>- Role:<br>- Team:<br>- What my days mostly look like:<br><br><strong>## What matters right now</strong><br>- Top 3 priorities this quarter:<br>- What I\'m trying to get off my plate:<br><br><strong>## Where I live</strong><br>- Slack channels I check daily:<br>- Gmail labels I care about:<br>- Sheets/tools I touch most:<br><br><strong>## What wastes my time</strong><br>- 3 recurring tasks I\'d automate if I could:<br><br><strong>## How I want Claude to respond</strong><br>- Tone: (e.g., direct, warm, no fluff)<br>- Length: (e.g., short by default, longer only when I ask)<br>- Format: (e.g., bullets over paragraphs, bold the action items)<br>- When unsure: (e.g., ask me a clarifying question instead of guessing)<br><br><strong>## What to avoid</strong><br>- Don\'t over-explain things I already know<br>- Don\'t hedge or add disclaimers<br>- Don\'t summarize what I just said back to me<br><br><strong>Smart move before Step 2 - let Claude sharpen it for you:</strong> don\'t spend 30 minutes trying to write perfect instructions. Fill the template in quickly, then paste the whole doc into a fresh Claude chat with this prompt:<br><br><em>"Here\'s my rough Project Instructions for a NetOps workspace. Rewrite them as sharper, more direct Project Instructions - keep the structure, tighten the language, and flag anything missing I should add."</em><br><br>Claude hands you back a cleaner version written in a tone Claude itself responds to best. That\'s what you install in Step 2. Turns 30 minutes of writing into 10 minutes of editing, and the final doc is noticeably sharper than whatever you\'d draft alone.</div></div>
      <div class="iblock"><div class="iblock-title">Week 1 - Step 2: Install your doc as Project Instructions (10 min)</div><div class="iblock-desc">You\'re about to paste your doc (the sharpened version Claude wrote back to you in Step 1) into Claude\'s "Project Instructions" box. That field is Claude\'s standing briefing - it reads before every chat in this project. This is where your doc stops being a Google Doc and starts shaping every answer.<br><br>1. Go to <strong>claude.ai</strong> and log in<br>2. Left nav → click <strong>"Projects"</strong><br>3. Top right → click <strong>"Create project"</strong><br>4. Name it something like "My NetOps workspace"<br>5. Click <strong>"Set project instructions"</strong> (or "Add custom instructions" / "Edit instructions")<br>6. Copy your entire context doc from Step 1 → paste the full thing into that box<br>7. Save<br><br><strong>What changes immediately:</strong> every new chat inside this project starts with Claude already knowing who you are, what matters, and how you want it to respond. You\'ll stop re-explaining yourself, and answers will get noticeably sharper on day one.<br><br><strong>Optional extra:</strong> on the same project page, you\'ll see a "Project knowledge" section where you can upload additional files (a coaching doc, a playbook, last quarter\'s OKRs). Instructions = how Claude behaves. Knowledge = what Claude references. Start with just the instructions; add knowledge later.</div></div>
      <div class="iblock"><div class="iblock-title">Week 2 - Step 3: Connect your tools to your Project</div><div class="iblock-desc">You\'ve got three paths. Pick based on what you want - none are technical.<br><br><strong>Path A - Claude Connectors (fastest, start here)</strong><br>Inside claude.ai, turn on Gmail, Drive, Slack, Calendar. Now your Project can read them on demand: "check the Drive doc and tell me what changed" or "summarize emails from this week about X." Zero setup beyond clicking authorize. Full walkthrough is in the Level 2 Connectors scene.<br><br><strong>Path B - Zapier (for automatic rules)</strong><br>When you want something to happen without you - "every new email with label X logs to a Sheet." Follow the 6-step Zapier guide from Level 2. 10-15 minutes, no code.<br><br><strong>Path C - Apps Script (when Zapier templates don\'t fit)</strong><br>You\'re not writing code - Claude is. Tell your Claude Project: <em>"Write a Google Apps Script that [exactly what you want]. Give me the full working script."</em> Paste what Claude gives you into <strong>script.google.com</strong> → click ▶ Run → allow Gmail + Sheets permissions → left sidebar clock icon → Add Trigger → run every 10 minutes. If anything errors, paste the red text back to Claude: "what does this mean and how do I fix it?"</div></div>
      <div class="iblock"><div class="iblock-title">Week 3 - Step 4: Your Monday briefing</div><div class="iblock-desc">Inside your Claude Project, ask:<br><br><em>"Write me a weekly prompt I can paste every Monday morning. It should: 1) ask what\'s on my calendar this week, 2) check the Flag Tracker sheet for new entries since last Monday, 3) tell me my top 3 priorities based on my context doc. Format the output as a short DM I could send to myself."</em><br><br>Claude will give you a reusable prompt. Save it in a note somewhere obvious. Every Monday at 8am, paste it into your project. That\'s your command center briefing - it will get more useful as your sheets fill up.</div></div>
      <div class="iblock"><div class="iblock-title">Week 4 - Step 5: Iterate, don\'t rebuild</div><div class="iblock-desc">Don\'t start new projects. Instead: which of the 4 pieces needs a tweak? Add a second auto-logged sheet? Refine the briefing prompt? Expand the context doc with what you learned?<br><br>This is where command centers get real - through small additions, not from-scratch rebuilds.</div></div>`,
    outcome: { type: 'amber', label: 'If you get stuck - your safety net',
      text: 'Paste this into your Claude Project:\n\n"I\'m trying to [what you\'re building]. I\'m at [the step]. I don\'t understand [what\'s confusing]. Explain it like I\'ve never built anything like this before. Then tell me exactly what to click or paste next."\n\nClaude knows Claude Projects, Apps Script, and Zapier well. For errors: paste the exact text, ask "what does this mean and how do I fix it?" This prompt is your safety net through the whole build.',
      nugget: 'Four weeks feels long. But in week 5 you\'ll have something that saves you 3-5 hours every week, forever. That\'s the trade - one month of small clicks for years of bought-back time.' },
    choices: [
      { text: 'I\'m done - share my level', next: 'finish' }
    ]
  },
  finish: {
    lvl: 3, cardClass: 'l3',
    tag: 'tg-navy', tagText: '🐶 ziggy says: nice work!',
    title: 'You finished the adventure.',
    body: 'Share what level you reached with the team. Every share helps build the collective - your insight might be exactly what a teammate needs to hear this week.',
    choices: [
      { text: 'Play again from the beginning', next: 'start' }
    ]
  }
};

let history = [];
let xp = 0;
const visited = new Set();
let currentLevel = 1;

function getDefaultMsg(lvl, sMode) {
  const map = sMode === 'public' ? LEVEL_SHARE_PUBLIC : LEVEL_SHARE_ANON;
  return map[lvl] || map[1];
}

function buildSharePanel(lvl) {
  const textareaValue = draftMode === 'template' ? getDefaultMsg(lvl, shareMode) : userDraft;
  const placeholder = draftMode === 'custom'
    ? 'Write your own - what you learned, what surprised you, what you\'re trying this week...'
    : '';
  const openLabel = shareMode === 'public' ? 'Open #ai-users ↗' : 'Open Ziggy DM ↗';
  return `<div class="share-panel">
    <div class="share-title">🐶 Share your takeaway</div>
    <div class="share-sub">Pick your comfort level. Anonymous goes straight to Ziggy, public lands in #ai-users.</div>
    <div class="share-label">Where to share</div>
    <div class="share-toggle">
      <button class="toggle-btn ${shareMode === 'public' ? 'active' : ''}" id="mode-public" onclick="setShareMode('public')">✨ Public in #ai-users</button>
      <button class="toggle-btn ${shareMode === 'anon' ? 'active' : ''}" id="mode-anon" onclick="setShareMode('anon')">🌱 Anonymous to Ziggy</button>
    </div>
    <div class="share-label">What to share</div>
    <div class="share-toggle">
      <button class="toggle-btn ${draftMode === 'template' ? 'active' : ''}" id="draft-template" onclick="setDraftMode('template')">📝 Use template</button>
      <button class="toggle-btn ${draftMode === 'custom' ? 'active' : ''}" id="draft-custom" onclick="setDraftMode('custom')">✍️ Write my own</button>
    </div>
    <textarea class="share-preview" id="share-text" placeholder="${placeholder}" oninput="handleDraftInput(event)">${textareaValue}</textarea>
    <div class="share-btns">
      <button class="share-btn btn-copy" onclick="copyShare()">Copy message</button>
      <button class="share-btn btn-slack" id="btn-open" onclick="openShareTarget()">${openLabel}</button>
    </div>
    <div class="copied-msg" id="copied-msg">✓ Copied! Now paste it into Slack.</div>
  </div>`;
}

function handleDraftInput(e) {
  if (draftMode === 'custom') userDraft = e.target.value;
}

function setShareMode(mode) {
  if (draftMode === 'custom') {
    userDraft = document.getElementById('share-text').value;
  }
  shareMode = mode;
  updateSharePanel();
}

function setDraftMode(mode) {
  const ta = document.getElementById('share-text');
  if (draftMode === 'custom' && ta) {
    userDraft = ta.value;
  }
  draftMode = mode;
  updateSharePanel();
}

function updateSharePanel() {
  const ta = document.getElementById('share-text');
  if (!ta) return;
  ta.value = draftMode === 'template' ? getDefaultMsg(currentLevel, shareMode) : userDraft;
  ta.placeholder = draftMode === 'custom'
    ? 'Write your own - what you learned, what surprised you, what you\'re trying this week...'
    : '';
  document.getElementById('mode-public').classList.toggle('active', shareMode === 'public');
  document.getElementById('mode-anon').classList.toggle('active', shareMode === 'anon');
  document.getElementById('draft-template').classList.toggle('active', draftMode === 'template');
  document.getElementById('draft-custom').classList.toggle('active', draftMode === 'custom');
  document.getElementById('btn-open').textContent = shareMode === 'public' ? 'Open #ai-users ↗' : 'Open Ziggy DM ↗';
  if (draftMode === 'custom') ta.focus();
}

function copyShare() {
  const txt = document.getElementById('share-text').value;
  if (!txt.trim()) {
    const m = document.getElementById('copied-msg');
    if (m) {
      m.textContent = '↑ Write something first, then copy.';
      m.style.color = '#FFB3D1';
      m.style.display = 'block';
      setTimeout(() => { m.style.display = 'none'; m.textContent = '✓ Copied! Now paste it into Slack.'; m.style.color = ''; }, 3000);
    }
    return;
  }
  navigator.clipboard.writeText(txt).then(() => {
    showCopied();
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied();
  });
}

function showCopied() {
  const m = document.getElementById('copied-msg');
  if (m) { m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 3000); }
}

function openShareTarget() {
  const url = shareMode === 'public'
    ? 'https://slack.com/app_redirect?channel=C053P53KKLZ&team=E02S4APAXMJ'
    : 'https://slack.com/app_redirect?channel=U0AM56K2V24&team=E02S4APAXMJ';
  window.open(url, '_blank');
}

function render(sid) {
  const s = scenes[sid];
  if (!s) return;
  if (!visited.has(sid)) { xp += 10; visited.add(sid); }
  if (s.lvl > 0) currentLevel = s.lvl;

  const c = document.getElementById('scene-container');
  c.dataset.current = sid;

  const LEVEL_INTRO = { 1: 'l1_habits', 2: 'l2_intro', 3: 'l3_intro' };
  const lvlBadges = [1, 2, 3].map(n => {
    const active = s.lvl === n;
    const cls = active ? `lvl l${n}` : 'lvl';
    return `<button class="${cls}" onclick="go('${LEVEL_INTRO[n]}')">${LEVEL_LABELS[n]}</button>`;
  }).join('');

  const dots = SCENEKEYS.map(k => {
    const cls = k === sid ? 'dot active' : visited.has(k) ? 'dot done' : 'dot';
    return `<div class="${cls}"></div>`;
  }).join('');

  let outHTML = '';
  if (s.outcome) {
    const o = s.outcome;
    const txt = o.text.replace(/\n/g, '<br>');
    outHTML = `<div class="obox ${o.type}">
      <div class="olabel">${o.label}</div>
      <div class="otext">${txt}</div>
      <div class="nugget"><span>→</span><span>${o.nugget}</span></div>
    </div>`;
  }

  const ch = s.choices.map(c =>
    `<button class="choice" onclick="go('${c.next}')">${c.text}<span class="choice-arrow">›</span></button>`
  ).join('');

  const back = history.length > 0 ? `<button class="nav-btn" onclick="goBack()">← back</button>` : '';
  const sharePanelHTML = sid === 'finish' ? buildSharePanel(currentLevel) : '';

  const sceneZiggy = s.lvl === 1 ? ZIGGY.l1 : s.lvl === 2 ? ZIGGY.l2 : s.lvl === 3 ? ZIGGY.l3 : null;
  const sceneZiggyHTML = sceneZiggy && sid !== 'finish' ? `<img class="scene-ziggy" src="${sceneZiggy}" alt="Ziggy">` : '';
  const finishZiggyHTML = sid === 'finish' ? `<img class="finish-ziggy" src="${ZIGGY.party}" alt="Ziggy celebrating">` : '';

  c.innerHTML = `
    <div class="score-bar">
      <div class="dots">${dots}</div>
      <span class="xp">${xp} XP</span>
      <span class="explored">${visited.size} of ${SCENEKEYS.length} explored</span>
    </div>
    <div class="level-track">${lvlBadges}</div>
    <div class="card ${s.cardClass || ''}">
      ${sceneZiggyHTML}
      <span class="tag ${s.tag}">${s.tagText}</span>
      ${finishZiggyHTML}
      <div class="scene-title">${s.title}</div>
      <div class="scene-body">${s.body}</div>
      ${s.empathy ? `<div class="empathy">${s.empathy}</div>` : ''}
      ${s.customHTML || ''}
      ${outHTML}
      <div class="choices">${ch}</div>
    </div>
    ${sharePanelHTML}
    <div class="nav-row">${back}</div>`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function go(sid) {
  const cur = document.getElementById('scene-container').dataset.current;
  history.push(cur);
  render(sid);
}

function goBack() {
  const prev = history.pop();
  if (prev) render(prev);
}

document.getElementById('hero-ziggy').src = ZIGGY.hero;
render('start');
</script>
</body>
</html>
